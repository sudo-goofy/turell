<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig für Touch-Displays: Verhindert Zoomen und Skalieren -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turell Puzzle</title>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           CSS & STYLING
           ========================================== */
        * {
            box-sizing: border-box;
            user-select: none; /* Verhindert Textmarkierung auf Touch-Displays */
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #030305; /* Sehr dunkler Hintergrund für leuchtende Farben */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none; /* Verhindert Browser-Scrollen beim Draggen */
        }

        /* Ambienter Hintergrund-Glow */
        #ambient-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            transition: background 3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        /* Anleitung am Anfang */
        #hint {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-weight: 200;
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            z-index: 10;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        /* Die schwebenden Licht-Kreise (Orbs) */
        .orb {
            position: absolute;
            width: 45vmin; /* Passt sich der Bildschirmgröße an */
            height: 45vmin;
            max-width: 600px;
            max-height: 600px;
            border-radius: 50%;
            /* Anfänglich neutrales, leicht pulsierendes Grau */
            background: radial-gradient(circle, rgba(120,120,120,0.5) 0%, rgba(120,120,120,0) 70%);
            mix-blend-mode: screen; /* Additive Farbmischung! (R+G = Gelb) */
            display: flex;
            justify-content: center;
            align-items: center;
            color: transparent;
            font-size: 4vmin;
            font-family: 'Funnel Sans', sans-serif;
            font-weight: 400;
            letter-spacing: 0.3rem;
            transform: translate(-50%, -50%); /* Zentriert den Orb am Maus/Touch-Punkt */
            transition: background 1.5s ease, color 1.5s ease, transform 0.1s ease-out;
            cursor: grab;
            z-index: 5;
            animation: breathe 6s infinite alternate;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.05); }
        }

        .orb:active { cursor: grabbing; }

        /* Aktivierte Farben (Erwachen durch Berührung) */
        .orb.active-r { background: radial-gradient(circle, rgba(255,0,0,0.9) 0%, rgba(255,0,0,0) 70%); color: rgba(255,255,255,0.9); text-shadow: 0 0 20px rgba(255,0,0,0.8); }
        .orb.active-g { background: radial-gradient(circle, rgba(0,255,0,0.9) 0%, rgba(0,255,0,0) 70%); color: rgba(255,255,255,0.9); text-shadow: 0 0 20px rgba(0,255,0,0.8); }
        .orb.active-b { background: radial-gradient(circle, rgba(0,0,255,0.9) 0%, rgba(0,0,255,0) 70%); color: rgba(255,255,255,0.9); text-shadow: 0 0 20px rgba(0,0,255,0.8); }

        /* Hint-Orb: Startet neutral wie die anderen */
        .orb.hint-orb {
            font-size: 2.2vmin;
            letter-spacing: 0.15rem;
            text-align: center;
            padding: 0 15%;
            cursor: grab;
        }

        /* Hint-Orb aktiviert: Sanftes Weiß */
        .orb.active-hint {
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
            color: rgba(255,255,255,0.85);
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        /* Benutzeroberfläche (Hex-Eingabe) */
        .ui-container {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.92vh;
            z-index: 20;
            opacity: 1;
            transition: opacity 1s ease;
        }

        .hex-display {
            font-size: 2.88rem;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 200;
            letter-spacing: 0.96rem;
            transition: color 0.3s ease, transform 0.1s ease;
        }

        .hex-display.error {
            color: rgba(255, 0, 0, 0.8);
            transform: translateX(10px); /* Leichtes Wackeln bei Fehler */
        }

        /* Minimalistisches Keypad */
        .keypad {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 14.4px;
            opacity: 0.4;
            transition: opacity 0.5s ease;
        }

        .keypad:hover, .keypad:active, .keypad:focus-within {
            opacity: 1;
        }

        .key {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1.44rem;
            font-weight: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .key:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.9);
        }

        .key.action-key {
            background: rgba(255, 255, 255, 0.05);
            font-size: 1.2rem;
        }

        /* ==========================================
           WOW-ANIMATION KLASSEN (Win State)
           ========================================== */
        .orb.win-anim {
            /* Deaktiviere das sanfte Atmen während des Wins */
            animation: none !important; 
            mix-blend-mode: normal !important;
            color: transparent !important; /* Text verstecken */
            background: radial-gradient(circle, #8A2BE2 0%, #8A2BE2 100%) !important;
            transition: top 2s cubic-bezier(0.25, 1, 0.5, 1), 
                        left 2s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 3s cubic-bezier(0.25, 1, 0.5, 1) 1.5s,
                        background 2s ease !important;
        }

        .success-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 5vw;
            font-weight: 100;
            letter-spacing: 2vw;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 3s ease 4s; /* Erscheint ganz am Ende */
            text-align: center;
            text-transform: uppercase;
        }

        .success-message.show {
            opacity: 1;
        }

        /* Pause/Play Button */
        #pause-btn {
            position: absolute;
            bottom: 2vh;
            right: 2vh;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s ease;
        }

        #pause-btn:hover {
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.3);
        }

    </style>
</head>
<body>

    <div id="ambient-bg"></div>
    <div id="hint">BERÜHREN UND ERFORSCHEN</div>

    <!-- Die 3 Lichtkreise -->
    <!-- R = 138 (Dec) -->
    <div class="orb" id="orb-r" data-color="active-r">138</div>
    <!-- G = 43 (Dec) -> 00101011 (Bin) -->
    <div class="orb" id="orb-g" data-color="active-g">00101011</div>
    <!-- B = 226 (Dec) -->
    <div class="orb" id="orb-b" data-color="active-b">226</div>

    <!-- Hint-Orb -->
    <!--div class="orb hint-orb" id="orb-hint" data-color="active-hint">Farben des Lichts vereint in einem Code</div-->

    <!-- UI für die Code-Eingabe -->
    <div class="ui-container" id="ui">
        <div class="hex-display" id="hex-display">#_ _ _ _ _ _</div>
        
        <div class="keypad">
            <!-- Reihe 1: 0-7 -->
            <div class="key" onclick="pressKey('0')">0</div>
            <div class="key" onclick="pressKey('1')">1</div>
            <div class="key" onclick="pressKey('2')">2</div>
            <div class="key" onclick="pressKey('3')">3</div>
            <div class="key" onclick="pressKey('4')">4</div>
            <div class="key" onclick="pressKey('5')">5</div>
            <div class="key" onclick="pressKey('6')">6</div>
            <div class="key" onclick="pressKey('7')">7</div>
            
            <!-- Reihe 2: 8-F und Löschen -->
            <div class="key" onclick="pressKey('8')">8</div>
            <div class="key" onclick="pressKey('9')">9</div>
            <div class="key" onclick="pressKey('A')">A</div>
            <div class="key" onclick="pressKey('B')">B</div>
            <div class="key" onclick="pressKey('C')">C</div>
            <div class="key" onclick="pressKey('D')">D</div>
            <div class="key" onclick="pressKey('E')">E</div>
            <div class="key" onclick="pressKey('F')">F</div>
        </div>
        <div class="keypad" style="margin-top: -5px;">
             <div class="key action-key" style="grid-column: 1 / -1; width: 100px; border-radius: 25px;" onclick="deleteKey()">DEL</div>
        </div>
    </div>

    <!-- Gewinner-Text (anfangs unsichtbar) -->
    <div class="success-message" id="success">Erleuchtung</div>

    <!-- Pause/Play Button -->
    <div id="pause-btn" onclick="togglePause()">&#9646;&#9646;</div>

    <script>
        /* ==========================================
           LOGIK & INTERAKTION
           ========================================== */
        
        const orbs = document.querySelectorAll('.orb');
        const hint = document.getElementById('hint');
        
        let isWon = false; // Verhindert Bewegung nach Gewinn
        let isPaused = false; // Pause-Zustand für Orb-Animation

        // Positioniere die Orbs anfangs zufällig, aber verteilt
        const positions = [
            { x: window.innerWidth * 0.3, y: window.innerHeight * 0.4 },
            { x: window.innerWidth * 0.7, y: window.innerHeight * 0.4 },
            { x: window.innerWidth * 0.5, y: window.innerHeight * 0.7 },
            { x: window.innerWidth * 0.5, y: window.innerHeight * 0.25 }
        ];

        // Daten für die kontinuierliche Bewegung jedes Orbs
        const orbData = Array.from(orbs).map((orb, index) => {
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.3 + Math.random() * 0.5; // Sanfte, langsame Geschwindigkeit
            return {
                el: orb,
                x: positions[index].x,
                y: positions[index].y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                isDragging: false,
                offsetX: 0,
                offsetY: 0
            };
        });

        let draggedOrbData = null;
        let dragStartX = 0;
        let dragStartY = 0;
        let hasMoved = false;

        orbData.forEach((data, index) => {
            const orb = data.el;
            orb.style.left = `${data.x}px`;
            orb.style.top = `${data.y}px`;

            // Pointer Events (unterstützt Touch, Maus und Stift nahtlos)
            orb.addEventListener('pointerdown', (e) => {
                if (isWon) return;

                // Hint ausblenden bei der ersten Berührung
                hint.style.opacity = '0';

                draggedOrbData = data;
                data.isDragging = true;
                
                // Für Klick-vs-Drag-Erkennung
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                hasMoved = false;
                
                // Berechne den Offset, damit das Element beim Greifen nicht zum Cursor springt
                data.offsetX = data.x - e.clientX;
                data.offsetY = data.y - e.clientY;
                
                orb.setPointerCapture(e.pointerId);
                
                // Deaktiviere sanfte Transitionen fürs flüssige Ziehen
                orb.style.transition = 'none';
                orb.style.animation = 'none';
            });
        });

        // Dragging Logik auf dem gesamten Fenster
        window.addEventListener('pointermove', (e) => {
            if (!draggedOrbData || isWon) return;
            // Verhindert Standardverhalten wie Scrollen beim Ziehen
            e.preventDefault(); 
            
            // Überprüfe, ob es ein Drag oder nur ein Klick ist (10px Toleranz für ungenaue Finger auf Touch)
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                hasMoved = true;
            }

            // Positioniere mit Offset
            draggedOrbData.x = e.clientX + draggedOrbData.offsetX;
            draggedOrbData.y = e.clientY + draggedOrbData.offsetY;
            
            draggedOrbData.el.style.left = `${draggedOrbData.x}px`;
            draggedOrbData.el.style.top = `${draggedOrbData.y}px`;
        }, { passive: false });

        window.addEventListener('pointerup', (e) => {
            if (!draggedOrbData || isWon) return;
            
            const orb = draggedOrbData.el;

            // Wenn es nur ein kurzer Klick ohne signifikante Bewegung war: Zustand umschalten (An/Aus)
            if (!hasMoved) {
                const colorClass = orb.dataset.color;
                if (colorClass) {
                    if (orb.classList.contains(colorClass)) {
                        orb.classList.remove(colorClass);
                    } else {
                        orb.classList.add(colorClass);
                    }
                }
            } else {
                 // Wenn gezogen, stelle sicher, dass es eingeschaltet bleibt (besseres Feedback beim Mischen)
                 orb.classList.add(orb.dataset.color);
            }

            // Transitionen reaktivieren, damit Überblendungen weich bleiben
            orb.style.transition = 'background 1.5s ease, color 1.5s ease, transform 0.1s ease-out';
            orb.style.animation = 'breathe 6s infinite alternate';
            orb.releasePointerCapture(e.pointerId);
            
            draggedOrbData.isDragging = false;
            draggedOrbData = null;
        });

        // Animations-Schleife für die kontinuierliche Bewegung
        function animateOrbs() {
            if (isWon) return;

            orbData.forEach(data => {
                if (data.isDragging || isPaused) return; // Nicht bewegen, wenn der Nutzer es festhält

                data.x += data.vx;
                data.y += data.vy;

                // Dynamischer Radius basierend auf der aktuellen Fenstergröße (wg. 45vmin im CSS)
                const radius = data.el.offsetWidth / 2;
                
                // Abprallen an den horizontalen Rändern
                if (data.x < radius) { 
                    data.x = radius; 
                    data.vx *= -1; 
                } else if (data.x > window.innerWidth - radius) { 
                    data.x = window.innerWidth - radius; 
                    data.vx *= -1; 
                }

                // Abprallen an den vertikalen Rändern
                // Orbs dürfen bis zu 40% ihres Durchmessers ins Keyboard ragen
                const uiEl = document.getElementById('ui');
                const uiTop = uiEl.getBoundingClientRect().top;
                const maxY = uiTop - radius + radius * 0.8; // 40% des Durchmessers Überlappung
                if (data.y < radius) { 
                    data.y = radius; 
                    data.vy *= -1; 
                } else if (data.y > maxY) { 
                    data.y = maxY; 
                    data.vy *= -1; 
                }

                data.el.style.left = `${data.x}px`;
                data.el.style.top = `${data.y}px`;
            });

            requestAnimationFrame(animateOrbs);
        }

        // Starte die Physik-Animation
        requestAnimationFrame(animateOrbs);

        /* ==========================================
           RÄTSEL-LOGIK (Hex Code Eingabe)
           ========================================== */
        
        let currentInput = "";
        const targetCode = "8A2BE2"; // Die Lösung des Rätsels
        const display = document.getElementById('hex-display');

        function updateDisplay() {
            // Formatiert den String so: # 8 A 2 _ _ _
            let formatted = currentInput.padEnd(6, '_').split('').join(' ');
            display.innerText = `# ${formatted}`;
        }

        function pressKey(char) {
            if (currentInput.length < 6) {
                currentInput += char;
                updateDisplay();
                
                // Überprüfe den Code, wenn 6 Zeichen erreicht sind
                if (currentInput.length === 6) {
                    checkCode();
                }
            }
        }

        function deleteKey() {
            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                updateDisplay();
            }
        }

        function checkCode() {
            if (currentInput === targetCode) {
                triggerWowEffect();
            } else {
                // Falscher Code: Rot blinken und zurücksetzen
                display.classList.add('error');
                setTimeout(() => {
                    display.classList.remove('error');
                    currentInput = "";
                    updateDisplay();
                }, 600);
            }
        }

        /* ==========================================
           DAS WOW-ERLEBNIS (Gewonnen)
           ========================================== */
        
        function triggerWowEffect() {
            isWon = true; // Stoppt die automatische Bewegung

            // 1. UI ausblenden
            document.getElementById('ui').style.pointerEvents = 'none';
            document.getElementById('ui').style.opacity = '0';

            // 2. Hintergrund leicht anpassen
            document.getElementById('ambient-bg').style.background = '#000';

            // 3. Orbs in die Mitte ziehen und verschmelzen lassen
            orbs.forEach(orb => {
                orb.classList.add('win-anim');
                // Setze Position hart auf die Mitte
                orb.style.left = '50%';
                orb.style.top = '50%';
                // Im win-anim CSS wird es nach 1.5s extrem hochskaliert
                // um den gesamten Bildschirm mit der Zielfarbe (#8A2BE2) zu füllen.
                setTimeout(() => {
                    orb.style.transform = 'translate(-50%, -50%) scale(50)';
                }, 1500);
            });

            // 4. Erfolgsnachricht anzeigen
            document.getElementById('success').classList.add('show');

            // Pause-Button ausblenden
            document.getElementById('pause-btn').style.opacity = '0';
            document.getElementById('pause-btn').style.pointerEvents = 'none';
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerHTML = isPaused ? '&#9654;' : '&#9646;&#9646;';
        }

    </script>
</body>
</html>
